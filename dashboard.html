<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — TaskFlow</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="app-layout">

    <!-- ── Sidebar ── -->
    <aside class="sidebar" id="sidebar" data-testid="sidebar">
      <a href="dashboard.html" class="sidebar-brand" data-testid="sidebar-brand">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:24px;height:24px;flex-shrink:0;">
          <rect width="32" height="32" rx="8" fill="currentColor"/>
          <path d="M9 16.5l5 5 9-9" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        TaskFlow
      </a>

      <nav class="sidebar-nav">
        <a href="dashboard.html" class="sidebar-link active" data-testid="nav-dashboard">
          <span class="icon">📋</span>
          Dashboard
          <span class="badge badge-primary" data-active-badge style="margin-left:auto;display:none;">0</span>
        </a>
        <a href="profile.html" class="sidebar-link" data-testid="nav-profile">
          <span class="icon">👤</span>
          Profile
        </a>
        <!-- Overdue tasks indicator in sidebar -->
        <div class="sidebar-link" style="cursor:default;" data-testid="sidebar-overdue-row">
          <span class="icon">⚠️</span>
          Overdue
          <span class="badge" id="overdue-badge" data-testid="overdue-badge" style="margin-left:auto;background:#ef4444;color:#fff;display:none;">0</span>
        </div>
      </nav>

      <div class="sidebar-footer">
        <!-- Dark mode toggle -->
        <button
          class="btn btn-ghost btn-full btn-sm mb-1"
          id="dark-mode-btn"
          data-testid="dark-mode-btn"
          type="button"
        >🌙 Dark mode</button>

        <div class="nav-user" style="padding:.5rem .875rem;margin-bottom:.75rem;">
          <div class="avatar" data-user-avatar></div>
          <div style="min-width:0;">
            <p class="fw-600 text-sm" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" data-user-name></p>
            <p class="text-xs text-muted" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" data-user-email></p>
          </div>
        </div>
        <button class="btn btn-ghost btn-full btn-sm" data-testid="logout-btn">
          ↩ Log out
        </button>
      </div>
    </aside>

    <!-- ── Main content ── -->
    <main class="main-content">

      <header class="page-header" data-testid="page-header">
        <h1 class="page-title">Dashboard</h1>
        <p class="page-subtitle">Welcome back, <strong data-user-name>…</strong> — here's your task overview.</p>
      </header>

      <div class="page-body">

        <!-- Stats row -->
        <div class="grid grid-4 gap-2 mb-3" data-testid="stats-grid">
          <div class="stat-card" data-testid="stat-total">
            <div class="stat-icon">📋</div>
            <div class="stat-value" data-stat="total">0</div>
            <div class="stat-label">Total tasks</div>
          </div>
          <div class="stat-card" data-testid="stat-active">
            <div class="stat-icon">🔥</div>
            <div class="stat-value" data-stat="active">0</div>
            <div class="stat-label">Active tasks</div>
          </div>
          <div class="stat-card" data-testid="stat-completed">
            <div class="stat-icon">✅</div>
            <div class="stat-value" data-stat="completed">0</div>
            <div class="stat-label">Completed</div>
          </div>
          <div class="stat-card" data-testid="stat-overdue">
            <div class="stat-icon">⚠️</div>
            <div class="stat-value" id="stat-overdue-value" data-testid="stat-overdue-value">0</div>
            <div class="stat-label">Overdue</div>
          </div>
        </div>

        <!-- Add task card -->
        <div class="card mb-3" data-testid="add-task-card">
          <div class="card-body">
            <h3 class="mb-2" style="font-size:1rem;">Add a new task</h3>
            <form id="add-task-form" data-testid="add-task-form">
              <div style="display:flex;gap:.75rem;align-items:flex-start;flex-wrap:wrap;">
                <div style="flex:1;min-width:200px;">
                  <input
                    class="form-input"
                    type="text"
                    id="task-input"
                    placeholder="What needs to be done?"
                    maxlength="200"
                    autocomplete="off"
                    data-testid="task-input"
                    aria-label="Task title"
                  />
                  <span class="field-error" id="task-input-error" data-testid="task-input-error"></span>
                </div>
                <div>
                  <select class="form-input" id="priority-select" data-testid="priority-select" style="width:auto;" aria-label="Task priority">
                    <option value="low">🟢 Low</option>
                    <option value="medium" selected>🟡 Medium</option>
                    <option value="high">🔴 High</option>
                  </select>
                </div>
                <div>
                  <input
                    class="form-input"
                    type="date"
                    id="due-date-input"
                    data-testid="due-date-input"
                    title="Due date (optional)"
                    style="width:auto;"
                  />
                </div>
                <button type="submit" class="btn btn-primary" data-testid="add-task-btn">
                  + Add task
                </button>
              </div>
            </form>
          </div>
        </div>

        <!-- Task list card -->
        <div class="card" data-testid="tasks-card">
          <div class="card-header" style="padding-bottom:.75rem;">
            <div style="display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;">
              <h3 style="font-size:1rem;margin:0;">My Tasks</h3>
              <!-- Search bar -->
              <div style="display:flex;align-items:center;gap:.5rem;">
                <input
                  class="form-input"
                  type="search"
                  placeholder="Search tasks…"
                  data-testid="task-search"
                  style="padding:.4rem .75rem;font-size:.875rem;width:200px;"
                  autocomplete="off"
                />
                <button class="btn btn-ghost btn-sm" data-testid="clear-search" type="button" style="padding:.4rem .625rem;font-size:.8rem;">Clear</button>
              </div>
            </div>

            <!-- Toolbar: filters + sort + bulk actions -->
            <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem;margin-top:.875rem;">
              <!-- Filter tabs -->
              <div class="tabs" data-testid="filter-tabs" style="margin-bottom:0;border-bottom:none;">
                <button class="tab active" data-filter="all" data-testid="filter-all">All</button>
                <button class="tab" data-filter="active" data-testid="filter-active">Active</button>
                <button class="tab" data-filter="completed" data-testid="filter-completed">Completed</button>
                <button class="tab" data-filter="overdue" data-testid="filter-overdue">Overdue</button>
              </div>

              <!-- Sort + bulk actions -->
              <div style="display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;">
                <select class="form-input" id="sort-select" data-testid="sort-select" style="padding:.35rem .75rem;font-size:.875rem;width:auto;">
                  <option value="default">Sort: Default</option>
                  <option value="newest">Newest first</option>
                  <option value="oldest">Oldest first</option>
                  <option value="priority">By priority</option>
                  <option value="az">A → Z</option>
                  <option value="za">Z → A</option>
                </select>
                <button class="btn btn-secondary btn-sm" id="mark-all-btn" data-testid="mark-all-btn" type="button">
                  ✓ Mark all complete
                </button>
                <button class="btn btn-ghost btn-sm" id="clear-completed-btn" data-testid="clear-completed-btn" type="button" style="color:var(--danger);border-color:var(--danger);">
                  🗑 Clear completed
                </button>
              </div>
            </div>
          </div>

          <div style="padding:0 1.75rem 1.75rem;margin-top:1rem;">
            <!-- Task list -->
            <div id="task-list" data-testid="task-list" style="display:flex;flex-direction:column;gap:.625rem;"></div>

            <!-- Empty state -->
            <div class="empty-state hidden" data-testid="task-empty">
              <span class="empty-icon">📭</span>
              <p id="empty-message">No tasks yet. Add your first task above!</p>
            </div>
          </div>
        </div>

      </div><!-- /.page-body -->
    </main>

  </div><!-- /.app-layout -->

  <script src="auth.js"></script>
  <script src="app.js"></script>
  <script>
    initDashboard();
  </script>
</body>
</html>
